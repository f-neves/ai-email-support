name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref to save minutes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    env:
      # Prisma needs a DATABASE_URL to read the schema; a dummy is fine since
      # CI only generates the client + type-checks (it never opens the DB).
      DATABASE_URL: 'file:./ci.db'
      # The Anthropic client is constructed at import time; a dummy key avoids a
      # constructor error. No network calls are made (tests are pure/offline).
      ANTHROPIC_API_KEY: 'sk-ant-ci-dummy'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run db:generate -w server

      - name: Lint (server)
        run: npm run lint

      - name: Test (server)
        run: npm test

      - name: Build (server + web)
        run: npm run build
